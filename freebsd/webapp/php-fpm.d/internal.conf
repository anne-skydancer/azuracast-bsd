; freebsd/webapp/php-fpm.d/internal.conf
;
; Internal php-fpm pool, serving only nginx's localhost-only :6010
; server block (PubSub / internal API calls -- see the "Internal
; connection handler" section of freebsd/webapp/nginx.conf, whose
; `upstream php-fpm-internal` points at this pool's socket). Install to:
;   /usr/local/etc/php-fpm.d/internal.conf
;
; Kept as a separate pool from [www] (matching the two-pool layout
; AzuraCast's Docker image used) so long-running internal requests --
; nginx gives this handler fastcgi_read_timeout 600 with buffering off
; -- can't starve the public-facing pool's workers.
;
; See www.conf's header comment for why these pool files must be
; installed at all (FreeBSD's stock pool matches neither the socket
; paths nor the user/ownership model this deployment needs, and was
; confirmed on a real install to fail silently).

[internal]
user = azuracast
group = azuracast

listen = /var/run/php-fpm-internal.sock
listen.owner = azuracast
listen.group = azuracast
listen.mode = 0660

; ondemand: internal traffic is sparse; no reason to hold idle workers.
pm = ondemand
pm.max_children = 5
pm.process_idle_timeout = 10s

catch_workers_output = yes
decorate_workers_output = no

clear_env = no

php_admin_flag[log_errors] = on
php_admin_value[error_log] = /var/log/azuracast/php-errors.log
php_admin_flag[display_errors] = off
