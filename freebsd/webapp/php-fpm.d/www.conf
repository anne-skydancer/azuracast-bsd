; freebsd/webapp/php-fpm.d/www.conf
;
; Main public-facing php-fpm pool. Install to:
;   /usr/local/etc/php-fpm.d/www.conf
; (REPLACING the stock www.conf FreeBSD's php85 package ships -- see below.)
;
; Why this file must exist -- confirmed during a real install: FreeBSD's
; stock pool config runs workers as user `www` listening on TCP
; 127.0.0.1:9000, but freebsd/webapp/nginx.conf's upstreams point at
; unix:/var/run/php-fpm-www.sock and unix:/var/run/php-fpm-internal.sock
; (matching the two-pool layout AzuraCast's Docker image used). With the
; stock pool left in place, those sockets simply never exist, so every
; request nginx hands to PHP fails -- and fails *silently*, because the
; stock config also has log_errors off, no error_log, and
; catch_workers_output off (worker stderr is discarded), leaving no
; trace in any log. This pool fixes all of that:
;   - workers run as `azuracast` (matching every /var/azuracast path's
;     ownership -- stock `www` workers could read the app but not write
;     sessions/cache/logs/uploads)
;   - listens on the exact socket nginx.conf's `upstream php-fpm-www`
;     expects, owned so nginx's azuracast-uid workers can connect
;   - worker stderr and PHP errors actually land in
;     /var/log/azuracast/php-errors.log instead of vanishing
;
; The php-fpm *master* is started as root by supervisord (see
; freebsd/webapp/supervisord.conf), which is what allows it to create
; sockets under /var/run and then privilege-drop each worker to the
; pool user below.

[www]
user = azuracast
group = azuracast

listen = /var/run/php-fpm-www.sock
listen.owner = azuracast
listen.group = azuracast
listen.mode = 0660

pm = dynamic
pm.max_children = 10
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3

; Without this, a worker's stderr (where PHP fatals go when error_log is
; unset) is discarded entirely -- the exact mechanism behind the
; "blank 500 with nothing in any log" failure mode this file's header
; describes.
catch_workers_output = yes
decorate_workers_output = no

; Pass supervisord/rc.d environment through to workers rather than
; scrubbing it (the app also reads azuracast.env itself via
; backend/src/Environment.php, so this is belt-and-suspenders, matching
; Docker's php-fpm behavior).
clear_env = no

php_admin_flag[log_errors] = on
php_admin_value[error_log] = /var/log/azuracast/php-errors.log
php_admin_flag[display_errors] = off
