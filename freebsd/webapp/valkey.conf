# freebsd/webapp/valkey.conf
#
# Install to wherever the FreeBSD `valkey` package's rc.d script expects
# its config (check the `valkey_config` rcvar after `pkg install valkey`;
# typically /usr/local/etc/valkey.conf). Adapted from
# util/docker/redis/redis/redis.conf.
#
# Deviation from the Docker source on purpose: the original binds
# `0.0.0.0` with `protected-mode no`, which was safe inside Docker's
# isolated per-container network namespace. In this jail, 10.8.0.110 is
# reachable from the rest of the internal network, and nothing outside
# this jail needs Valkey (PHP/Centrifugo/SFTPGo all run alongside it in
# the same `webapp` jail per REDIS_HOST=localhost) -- so this binds to
# loopback + the unix socket only, matching the same least-privilege
# posture used for the mariadb jail's bind-address.
#
# IPv6 loopback (::1) is included alongside 127.0.0.1 for dual-stack
# completeness/correctness -- this jail is dual-stack (WEBAPP_JAIL_IP6 in
# freebsd/env.conf), and a loopback-only client could in principle
# connect via ::1. This deliberately does NOT bind WEBAPP_JAIL_IP6 (the
# jail's routable IPv6 address) -- doing so would defeat the
# loopback-only security posture described above, which is intentional
# and out of scope to revisit here.

unixsocket /var/run/redis/redis.sock
unixsocketperm 766

protected-mode yes

bind 127.0.0.1 ::1
port 6379

save ""

appendonly no

maxmemory 128mb
maxmemory-policy allkeys-lfu

always-show-logo no
