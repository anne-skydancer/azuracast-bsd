# freebsd/webapp/valkey.conf
#
# Install to wherever the FreeBSD `valkey` package's rc.d script expects
# its config (check the `valkey_config` rcvar after `pkg install valkey`;
# typically /usr/local/etc/valkey.conf). Adapted from
# util/docker/redis/redis/redis.conf.
#
# Deviation from the Docker source on purpose: the original binds
# `0.0.0.0` with `protected-mode no`, which was safe inside Docker's
# isolated per-container network namespace. In this jail, WEBAPP_JAIL_IP
# (freebsd/env.conf) is reachable from the rest of the internal network,
# and nothing outside this jail needs Valkey (PHP/Centrifugo/SFTPGo all run
# alongside it in the same `webapp` jail per REDIS_HOST=localhost) -- so
# this binds to loopback + the unix socket only, matching the same
# least-privilege posture used for the mariadb jail's bind-address.
#
# IPv6 loopback (::1) is included alongside 127.0.0.1 for dual-stack
# completeness/correctness -- this jail is dual-stack (WEBAPP_JAIL_IP6 in
# freebsd/env.conf), and a loopback-only client could in principle
# connect via ::1. This deliberately does NOT bind WEBAPP_JAIL_IP6 (the
# jail's routable IPv6 address) -- doing so would defeat the
# loopback-only security posture described above, which is intentional
# and out of scope to revisit here.

unixsocket /var/run/redis/redis.sock
unixsocketperm 766

protected-mode yes

bind 127.0.0.1 ::1
port 6379

save ""

appendonly no

# Valkey serves BOTH the application cache AND the Symfony Messenger
# queue (media processing, playlist batch jobs, webhooks). The queue's
# stream keys carry no TTL and must NEVER be evicted -- an allkeys-*
# policy under memory pressure eats the streams and consumer groups out
# from under a running worker (confirmed live on the reference install:
# 128mb + allkeys-lfu during a full-library reprocess produced NOGROUP
# errors, failed acks, and silently lost jobs). volatile-lfu only ever
# evicts keys WITH a TTL (i.e. cache entries); the queue is untouchable,
# and if the ceiling is genuinely hit by non-volatile data, writes fail
# loudly instead of data vanishing quietly. 1GB is comfortable headroom
# for cache + a full-library job backlog on this deployment's hardware.
#
# Note: with save "" and appendonly no (inherited posture), a Valkey
# RESTART still empties the queue -- after restarting the service,
# re-dispatch pending work: azuracast:sync:task check_media --force.
maxmemory 1gb
maxmemory-policy volatile-lfu

always-show-logo no
