# freebsd/webapp/nginx.conf
#
# Install to /usr/local/etc/nginx/nginx.conf (FreeBSD nginx package
# convention; replaces Debian's /etc/nginx/nginx.conf).
#
# Adapted from util/docker/web/nginx/nginx.conf.tmpl (main http block) +
# util/docker/web/nginx/azuracast.conf.tmpl (server blocks), which
# Docker combines at runtime via `dockerize -template ...` into
# /etc/nginx/nginx.conf and /etc/nginx/sites-enabled/default.vhost
# respectively. Since there's no dockerize/templating step on this jail,
# both are merged into this single file and the `{{ .Env.X }}` template
# variables below are resolved to the same *default* values Docker's own
# templates fall back to (see azuracast.sample.env). Edit them directly
# here if you need different values -- there is no env-substitution layer.
#
# Removed vs. the Docker template (all APPLICATION_ENV=development-only):
#   - the Vite dev-server upstream + /static/vite_dist proxy branch
#   - the internal-6010 server's dev-only debug logging level
#   - `include /etc/nginx/modules-enabled/*.conf;` (Debian dynamic-module
#     convention; FreeBSD's nginx package is typically monolithic or uses
#     its own `modules/` mechanism -- add back only if you've installed
#     dynamic nginx modules via pkg).
#
# Paths changed from Debian conventions to FreeBSD:
#   /etc/nginx/mime.types              -> /usr/local/etc/nginx/mime.types
#   /etc/nginx/conf.d/*.conf            -> /usr/local/etc/nginx/conf.d/*.conf
#   /etc/nginx/sites-enabled/*          -> dropped (folded into this file)
#   /tmp/nginx_client|fastcgi|cache      -> /var/azuracast/www_tmp/nginx_*
#     (created by freebsd/webapp/00-packages.sh; kept off of /tmp since
#     FreeBSD jails commonly tmpfs-mount /tmp and we want these to
#     survive alongside the rest of AzuraCast's persistent state dir)
#   /var/run/nginx.pid                  -> unchanged (same convention)
#
# TLS cert paths point at ACME_DIR's default,
# /var/azuracast/storage/acme/ssl.{crt,key} -- same as Docker's default
# (see util/docker/web/startup_scripts/01_self_signed_ssl.sh, which
# generates a self-signed fallback there if no real cert exists).
#
# Dual-stack: this jail's WEBAPP_JAIL_IP6 (freebsd/env.conf) is a routable
# address at the network layer, so every `listen` directive below has a
# matching `listen [::]:PORT ...;` counterpart (IPv6 wildcard, same as the
# IPv4 wildcard-by-port already in use) so nginx actually accepts
# connections on both address families instead of silently IPv4-only.

user azuracast;
worker_processes auto;
worker_rlimit_nofile 65000;

error_log /var/log/azuracast/nginx-error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 65000;
    multi_accept on;
}

http {
    include       /usr/local/etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    log_format hls_json escape=json '{'
        '"msec": "$msec",'
        '"ua": "$http_user_agent",'
        '"ip": "$remote_addr",'
        '"ip_xff": "$http_x_forwarded_for",'
        '"uri": "$request_uri"'
        '}';

    access_log off;
    server_tokens off;
    keepalive_timeout 65;

    sendfile on;

    # Default from azuracast.sample.env / NGINX_CLIENT_MAX_BODY_SIZE.
    client_max_body_size 50M;
    client_body_temp_path /var/azuracast/www_tmp/nginx_client 1 1;
    large_client_header_buffers 8 64k;
    client_header_buffer_size 16k;

    fastcgi_temp_path /var/azuracast/www_tmp/nginx_fastcgi 1 1;
    proxy_temp_path /var/azuracast/www_tmp/nginx_proxy 1 1;
    uwsgi_temp_path /var/azuracast/www_tmp/nginx_uwsgi 1 1;
    scgi_temp_path /var/azuracast/www_tmp/nginx_scgi 1 1;

    fastcgi_cache_path /var/azuracast/www_tmp/nginx_cache levels=1:2 keys_zone=app:50m max_size=1g inactive=60m use_temp_path=off;
    fastcgi_cache_key "$scheme$request_method$host$request_uri";

    proxy_max_temp_file_size 0;

    map $http_x_forwarded_proto $proxy_x_forwarded_proto {
        default $http_x_forwarded_proto;
        ''      $scheme;
    }

    map $http_x_forwarded_port $proxy_x_forwarded_port {
        default $http_x_forwarded_port;
        ''      $server_port;
    }

    map $http_upgrade $proxy_connection {
        default upgrade;
        '' close;
    }

    map $scheme $proxy_x_forwarded_ssl {
        default off;
        https on;
    }

    # Enable Gzip compression
    gzip on;

    gzip_vary on;
    gzip_buffers 128 4k;
    gzip_comp_level 5;
    gzip_min_length 256;

    gzip_types
        application/atom+xml
        application/javascript
        application/json
        application/rss+xml
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/x-font-opentype
        application/x-font-truetype
        application/x-javascript
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/eot
        font/opentype
        font/otf
        image/svg+xml
        image/x-icon
        image/vnd.microsoft.icon
        text/css
        text/plain
        text/javascript
        text/x-component;

    gzip_disable "MSIE [1-6]\.(?!.*SV1)";

    include /usr/local/etc/nginx/conf.d/*.conf;

    # --- Upstreams -----------------------------------------------------------
    upstream centrifugo {
        server 127.0.0.1:6020;
    }

    upstream php-fpm-internal {
        server unix:/var/run/php-fpm-internal.sock;
    }

    upstream php-fpm-www {
        server unix:/var/run/php-fpm-www.sock;
    }

    # --- Internal connection handler for PubSub / internal API calls --------
    server {
        listen 127.0.0.1:6010;
        listen [::1]:6010;

        root /var/azuracast/www/web;
        index index.php;

        server_name localhost;

        location / {
            try_files $uri @clean_url;
        }

        location @clean_url {
            rewrite ^(.*)$ /index.php last;
        }

        location ~ ^/index\.php(/|$) {
            fastcgi_split_path_info ^(.+\.php)(/.+)$;

            fastcgi_pass php-fpm-internal;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            fastcgi_param DOCUMENT_ROOT $realpath_root;
            fastcgi_param IS_INTERNAL true;
            include fastcgi_params;

            fastcgi_read_timeout 600;
            fastcgi_buffering off;

            internal;
        }
    }

    # --- Main site -------------------------------------------------------------
    server {
        listen 80;
        listen [::]:80;
        listen 443 default_server ssl;
        listen [::]:443 default_server ssl;
        # Standalone directive replaces the deprecated `listen ... http2`
        # flag (nginx warns on the flag form since 1.25.1).
        http2 on;

        ssl_certificate        /var/azuracast/storage/acme/ssl.crt;
        ssl_certificate_key    /var/azuracast/storage/acme/ssl.key;

        ssl_protocols TLSv1.3 TLSv1.2;
        ssl_prefer_server_ciphers on;
        ssl_ecdh_curve secp521r1:secp384r1;
        ssl_ciphers EECDH+AESGCM:EECDH+AES256;

        ssl_session_cache shared:TLS:2m;
        ssl_buffer_size 4k;

        root /var/azuracast/www/web;
        index index.php;

        server_name localhost;

        add_header X-XSS-Protection 1;
        add_header X-Content-Type-Options nosniff;
        add_header Referrer-Policy no-referrer-when-downgrade;

        # LetsEncrypt / ACME handling
        location /.well-known/acme-challenge {
            alias /var/azuracast/storage/acme/challenges;
            try_files $uri =404;
        }

        # Built-in docs
        location /docs {
            alias /var/azuracast/docs;
            expires 1d;
            index index.html;
        }

        # Static version of now-playing data for non-PHP-blocking delivery.
        location /api/nowplaying_static {
            expires 10s;
            add_header Access-Control-Allow-Origin *;

            alias /var/azuracast/www_tmp/nowplaying;
            try_files $uri =404;
        }

        # Websocket/SSE Now Playing Updates (proxied to Centrifugo).
        # Inlined from util/docker/web/nginx/proxy_params.conf -- that file
        # isn't reproduced separately here since it's only ever `include`d
        # from this one location block.
        location ~ ^/api/live/nowplaying/(\w+)$ {
            proxy_http_version 1.1;
            proxy_set_header Origin $http_origin;
            proxy_set_header Host $http_host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $proxy_connection;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
            proxy_set_header X-Forwarded-Ssl $proxy_x_forwarded_ssl;
            proxy_set_header X-Forwarded-Port $proxy_x_forwarded_port;

            # Mitigate httpoxy attack (see Docker README for details)
            proxy_set_header Proxy "";

            proxy_buffering           off;
            proxy_ignore_client_abort off;
            proxy_send_timeout        21600;
            proxy_read_timeout        21600;

            proxy_pass http://centrifugo/connection/uni_$1?$args;
        }

        location / {
            try_files $uri @clean_url;
        }

        location @clean_url {
            rewrite ^(.*)$ /index.php last;
        }

        location /static {
            add_header Access-Control-Allow-Origin *;
        }

        location /static/uploads {
            rewrite ^(.+)\.(?:\w+)\.(js|css|png|jpg|webp)$ $1.$2 last;

            alias /var/azuracast/storage/uploads;
            try_files $uri =404;
        }

        location /static/vite_dist {
            expires 365d;
        }

        location /static/icons {
            expires 365d;
        }
        location /static/img {
            expires 7d;
        }

        location /favicon.ico {
            add_header Access-Control-Allow-Origin *;
            expires 365d;
        }

        location ~ ^/index\.php(/|$) {
            include /usr/local/etc/nginx/fastcgi_params;

            # Default from azuracast.sample.env / NGINX_TIMEOUT.
            fastcgi_read_timeout 1800;

            fastcgi_split_path_info ^(.+\.php)(/.+)$;

            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            fastcgi_param DOCUMENT_ROOT $realpath_root;

            fastcgi_cache app;
            fastcgi_cache_use_stale timeout updating;

            fastcgi_pass php-fpm-www;
            internal;
        }

        # Return 404 for all other php files not matching the front controller
        location ~ \.php$ {
            return 404;
        }

        location ~ /\.ht {
            deny all;
        }

        # Internal X-Accel-Redirect handlers
        location /internal/backups/ {
            internal;
            add_header Access-Control-Allow-Origin "$upstream_http_access_control_allow_origin";
            alias /var/azuracast/backups/;
        }

        location /internal/storage/ {
            internal;
            add_header Access-Control-Allow-Origin "$upstream_http_access_control_allow_origin";
            alias /var/azuracast/storage/;
        }

        location /internal/stations/ {
            internal;
            add_header Access-Control-Allow-Origin "$upstream_http_access_control_allow_origin";
            alias /var/azuracast/stations/;
        }

        include /var/azuracast/stations/*/config/nginx.conf;

        include /usr/local/etc/nginx/azuracast.conf.d/*.conf;
    }
}
