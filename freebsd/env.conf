# freebsd/env.conf
#
# Single source of truth for every network address, path, and hostname
# used across freebsd/mariadb/ and freebsd/webapp/. Every shell script in
# this tree sources this file instead of hardcoding an IP/path directly --
# edit the values below to match YOUR host's jail registry before running
# anything, then every script picks up the change automatically.
#
# The values shipped here are this project's own reference deployment
# (Anne's actual jail host) -- treat them as a worked example, not a
# universal default. If you're setting this up on a different host with
# a different epair/IP allocation scheme, change every value below first.
#
# This file is sourced with `.` (POSIX sh), not executed -- keep it to
# plain KEY=value assignments, no command substitution that depends on
# being run from a specific working directory.

# --- mariadb jail -------------------------------------------------------
MARIADB_JAIL_NAME="mariadb"
MARIADB_JAIL_HOSTNAME="mariadb.amc202d.lan"
MARIADB_JAIL_PATH="/jails/mariadb"
MARIADB_JAIL_EPAIR="epair7"
MARIADB_JAIL_IP="10.8.0.100"
MARIADB_JAIL_IP6="2001:8a0:6a32:2100::100"
MARIADB_PORT="3306"

# --- webapp jail ---------------------------------------------------------
WEBAPP_JAIL_NAME="webapp"
WEBAPP_JAIL_HOSTNAME="webapp.amc202d.lan"
WEBAPP_JAIL_PATH="/jails/webapp"
WEBAPP_JAIL_EPAIR="epair8"
WEBAPP_JAIL_IP="10.8.0.110"
WEBAPP_JAIL_IP6="2001:8a0:6a32:2100::110"

# --- shared host-level networking (same for every jail on this host) ----
VM_PUBLIC_BRIDGE="vm-public"
DEFAULT_ROUTE_V4="10.0.0.254"
DEFAULT_ROUTE_V6_GW="fe80::9e05:d6ff:fe65:5a7f"

# --- database defaults (name/user only -- NEVER put a real password here,
#     this file is meant to be safe to commit) ---------------------------
AZURACAST_DB_NAME_DEFAULT="azuracast"
AZURACAST_DB_USER_DEFAULT="azuracast"
