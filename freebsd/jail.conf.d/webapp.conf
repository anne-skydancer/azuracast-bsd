webapp {
    host.hostname = "webapp.example.com";
    path = "/jails/webapp";

    vnet;
    vnet.interface = "epair8b";

    # exec.poststop (the normal epair cleanup) only runs when a jail that
    # actually got created is removed -- a start attempt that fails partway
    # (prestart half-done, jail creation error) leaves an orphaned epair
    # behind that blocks every later start with "interface already exists".
    # The destroy-before-create makes prestart self-healing against that.
    exec.prestart  = "ifconfig epair8a destroy 2>/dev/null || true";
    exec.prestart += "ifconfig epair8 create";
    exec.prestart += "ifconfig vm-public addm epair8a";
    exec.prestart += "ifconfig epair8a up";
    exec.start    += "ifconfig epair8b 192.0.2.101/24 up";
    exec.start    += "ifconfig epair8b inet6 2001:db8::101/64 up";
    exec.start    += "route add default 192.0.2.254";
    exec.start    += "route add -6 default fe80::1%epair8b";
    exec.start    += "/bin/sh /etc/rc";
    exec.stop      = "/bin/sh /etc/rc.shutdown";
    exec.poststop  = "ifconfig epair8a destroy";
}
